<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tool Tester — BeamtimeHero</title>
    <link rel="stylesheet" href="/static/tool-tester.css">
</head>
<body>
    <div class="topbar">
        <h1>Tool Tester</h1>
        <div class="topbar-spacer"></div>
        <input type="text" class="search-input" id="search" placeholder="Search tools...">
        <button class="theme-btn" id="theme-toggle" title="Toggle dark mode">🌙</button>
    </div>

    <div class="phase-banner" id="phase-banner" style="display:none">
        <span class="phase-label">Phase Override</span>
        <select id="phase-select"></select>
        <span class="phase-hint">SPEC_MOCK active — phase gate can be overridden for testing</span>
    </div>

    <div class="summary-bar" id="summary-bar"></div>

    <div class="content" id="content">
        <p style="color: var(--text-muted); padding: 40px 0; text-align: center;">Loading tools...</p>
    </div>

    <script src="/static/tool-tester.js"></script>
</body>
</html>
